name: CI

# Run the full check suite on every pushed commit and every pull request.
on:
  push:
  pull_request:

# Cancel superseded runs on the same ref so only the latest commit is checked.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint, format, types, tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Don't persist GITHUB_TOKEN in git config — later steps run PR code.
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks (lint · format · types · tests)
        run: pnpm check
